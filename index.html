<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edge Trading Journal</title>

<style>
:root{
--bg:#0b1423;
--panel:#13233f;
--panel2:#162949;
--text:#ffffff;
--muted:#aab6cc;
--gold:#d4af37;
}

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#0b1423,#10203a);
color:var(--text);
}

.app{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{
width:260px;
background:#08101d;
padding:20px;
}

.logo{
font-size:22px;
font-weight:bold;
margin-bottom:20px;
}

.nav button{
display:block;
width:100%;
margin-bottom:10px;
padding:12px;
background:#13233f;
border:none;
color:white;
cursor:pointer;
border-radius:8px;
}

.nav button:hover{background:#1d355d}

/* MAIN */
.main{
flex:1;
padding:20px;
overflow:auto;
}

.section{display:none}
.section.active{display:block}

/* CARDS */
.card{
background:var(--panel);
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

/* FORM */
input,select,textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:none;
background:#1b2d4f;
color:white;
}

/* BUTTON */
.btn{
background:var(--gold);
border:none;
padding:10px;
cursor:pointer;
font-weight:bold;
}

/* TABLE */
table{width:100%;border-collapse:collapse}
td,th{padding:10px;border-bottom:1px solid #2a3c5e}

/* CHART BOX */
.chart{
height:200px;
background:#0f1f38;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
color:#888;
margin-bottom:20px;
}

</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">Edge Journal</div>

<div class="nav">
<button onclick="show('home')">Home</button>
<button onclick="show('overview')">Overview</button>
<button onclick="show('journal')">Trade Journal</button>
<button onclick="show('analytics')">Analytics</button>
<button onclick="show('charts')">Charts</button>
<button onclick="show('signin')">Sign In</button>
<button onclick="show('subscription')">Subscription</button>
</div>
</div>

<!-- MAIN -->
<div class="main">

<!-- HOME -->
<div id="home" class="section active">
<div class="card">
<h2>Welcome</h2>
<p>Premium trading journal for tracking performance, analytics, and execution.</p>
</div>
</div>

<!-- OVERVIEW -->
<div id="overview" class="section">
<div class="card">Win Rate: <span id="win">0%</span></div>
<div class="card">Trades: <span id="trades">0</span></div>
</div>

<!-- JOURNAL -->
<div id="journal" class="section">
<div class="card">

<select id="instrument">
<option>XAUUSD</option>
<option>EURUSD</option>
<option>GBPUSD</option>
<option>NASDAQ</option>
<option>SP500</option>
<option>Gold</option>
<option>Oil</option>
</select>

<select id="direction">
<option>Buy</option>
<option>Sell</option>
</select>

<input id="entry" placeholder="Entry">
<input id="exit" placeholder="Exit">

<button class="btn" onclick="addTrade()">Enter Trade</button>

</div>

<div class="card">
<table>
<thead>
<tr>
<th>Instrument</th>
<th>Dir</th>
<th>P/L</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>
</div>

<!-- ANALYTICS -->
<div id="analytics" class="section">
<div class="chart">Equity Curve</div>
<div class="chart">Win/Loss Pie</div>
<div class="chart">Performance Chart</div>
</div>

<!-- CHARTS -->
<div id="charts" class="section">
<div class="chart">Market Chart</div>
</div>

<!-- SIGN IN -->
<div id="signin" class="section">
<div class="card">
<h3>Sign In</h3>
<input placeholder="Email">
<input placeholder="Password">
<button class="btn">Login</button>
</div>
</div>

<!-- SUBSCRIPTION -->
<div id="subscription" class="section">
<div class="card">
<h3>Plans</h3>
<p>Basic / Pro / Elite</p>
<button class="btn">Subscribe</button>
</div>
</div>

</div>
</div>

<script>
let trades = []

function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'))
document.getElementById(id).classList.add('active')
}

function addTrade(){
let inst = document.getElementById('instrument').value
let dir = document.getElementById('direction').value
let entry = Number(document.getElementById('entry').value)
let exit = Number(document.getElementById('exit').value)

let pl = exit - entry
if(dir === "Sell") pl = -pl

trades.push(pl)

update()
}

function update(){
let table = document.getElementById('table')
table.innerHTML = ''

trades.forEach(t=>{
table.innerHTML += `<tr><td>XAU</td><td>-</td><td>${t}</td></tr>`
})

document.getElementById('trades').innerText = trades.length

let wins = trades.filter(t=>t>0).length
let rate = trades.length ? Math.round((wins/trades.length)*100) : 0
document.getElementById('win').innerText = rate + "%"
}
</script>

</body>
</html>
