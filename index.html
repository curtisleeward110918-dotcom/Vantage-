<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>XAUUSD Login Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #07111f;
      color: #f8fbff;
      padding: 24px;
    }
    .card {
      max-width: 520px;
      margin: 40px auto;
      background: #0d1a2b;
      border: 1px solid rgba(212,175,55,.2);
      border-radius: 18px;
      padding: 24px;
    }
    h1 { margin-top: 0; }
    label { display: block; margin: 14px 0 6px; color: #b7c2d4; }
    input {
      width: 100%;
      height: 44px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.12);
      background: #12233b;
      color: #f8fbff;
      padding: 0 12px;
    }
    button {
      margin-top: 16px;
      height: 44px;
      padding: 0 16px;
      border-radius: 10px;
      border: 1px solid rgba(212,175,55,.24);
      background: rgba(212,175,55,.18);
      color: #f8fbff;
      font-weight: 700;
      cursor: pointer;
    }
    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      background: #12233b;
      color: #b7c2d4;
      min-height: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>XAUUSD Login Test</h1>

    <label for="email">Email</label>
    <input id="email" type="email" />

    <label for="password">Password</label>
    <input id="password" type="password" />

    <button id="signInBtn" type="button">Sign in</button>
    <button id="signUpBtn" type="button">Create account</button>
    <button id="checkBtn" type="button">Check session</button>

    <div class="status" id="status">Ready.</div>
  </div>

  <script>
    const SUPABASE_URL = "https://wvptlyyxygoyipwbtzmp.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind2cHRseXl4eWdveWlwd2J0em1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5NTM2NjksImV4cCI6MjA5MTUyOTY2OX0.uuUUrmvR5lEXvuemHkE7ERr0Ef7vULBmkgKeJxJfI18";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const emailEl = document.getElementById("email");
    const passwordEl = document.getElementById("password");
    const statusEl = document.getElementById("status");

    function setStatus(message) {
      statusEl.textContent = message;
    }

    document.getElementById("signInBtn").addEventListener("click", async () => {
      setStatus("Signing in...");
      const email = emailEl.value.trim();
      const password = passwordEl.value;

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        setStatus("Sign in failed: " + error.message);
        return;
      }

      setStatus("Signed in as " + (data.user?.email || email));
    });

    document.getElementById("signUpBtn").addEventListener("click", async () => {
      setStatus("Creating account...");
      const email = emailEl.value.trim();
      const password = passwordEl.value;

      const { data, error } = await supabaseClient.auth.signUp({
        email,
        password
      });

      if (error) {
        setStatus("Sign up failed: " + error.message);
        return;
      }

      if (data.user && !data.session) {
        setStatus("Account created. Check your email if confirmation is enabled.");
      } else {
        setStatus("Account created and signed in.");
      }
    });

    document.getElementById("checkBtn").addEventListener("click", async () => {
      const { data, error } = await supabaseClient.auth.getUser();

      if (error) {
        setStatus("Session check failed: " + error.message);
        return;
      }

      if (data.user) {
        setStatus("Current session: " + data.user.email);
      } else {
        setStatus("No active session.");
      }
    });
  </script>
</body>
</html>
