<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAUUSD Journal Pro</title>
<style>
body{font-family:Arial;background:#0b1322;color:#fff;margin:0}
.card{background:#111a2f;padding:15px;margin:10px;border-radius:10px}
button{padding:10px;margin-top:5px}
img{max-width:100%;border-radius:8px;margin-top:8px}
</style>
</head>

<body>

<div class="card">
<h2>Add / Edit Trade</h2>
<input id="entry" placeholder="Entry"><br>
<input id="stop" placeholder="Stop"><br>
<input id="exit" placeholder="Exit"><br>
<input id="risk" placeholder="Risk"><br>
<input type="file" id="screenshot"><br>
<textarea id="notes" placeholder="Notes"></textarea><br>
<button onclick="saveTrade()">Save Trade</button>
</div>

<div class="card">
<h2>History</h2>
<div id="history"></div>
</div>

<script>
let trades = JSON.parse(localStorage.getItem("trades")||"[]");
let editIndex = null;

function saveTrade(){
let entry = Number(entryEl.value);
let stop = Number(stopEl.value);
let exit = Number(exitEl.value);
let risk = Number(riskEl.value);
let notes = notesEl.value;
let file = screenshotEl.files[0];

function finish(img){
let trade = {entry,stop,exit,risk,notes,screenshot:img};
if(editIndex!==null){
trades[editIndex]=trade;
editIndex=null;
}else{
trades.push(trade);
}
localStorage.setItem("trades",JSON.stringify(trades));
render();
clearForm();
}

if(file){
let reader=new FileReader();
reader.onload=e=>finish(e.target.result);
reader.readAsDataURL(file);
}else{
finish(null);
}
}

function render(){
let html="";
trades.forEach((t,i)=>{
html+=`
<div class="card">
Entry: ${t.entry}<br>
Exit: ${t.exit}<br>
<button onclick="viewTrade(${i})">View</button>
<button onclick="editTrade(${i})">Edit</button>
<button onclick="deleteTrade(${i})">Delete</button>
</div>`;
});
historyEl.innerHTML=html;
}

function viewTrade(i){
let t=trades[i];
let win=window.open("","_blank");
win.document.write("<h2>Trade</h2>");
win.document.write("Entry: "+t.entry+"<br>");
win.document.write("Stop: "+t.stop+"<br>");
win.document.write("Exit: "+t.exit+"<br>");
win.document.write("Risk: "+t.risk+"<br>");
win.document.write("Notes: "+t.notes+"<br>");
if(t.screenshot){
win.document.write("<img src='"+t.screenshot+"'>");
}
}

function editTrade(i){
let t=trades[i];
entryEl.value=t.entry;
stopEl.value=t.stop;
exitEl.value=t.exit;
riskEl.value=t.risk;
notesEl.value=t.notes;
editIndex=i;
}

function deleteTrade(i){
trades.splice(i,1);
localStorage.setItem("trades",JSON.stringify(trades));
render();
}

function clearForm(){
entryEl.value="";
stopEl.value="";
exitEl.value="";
riskEl.value="";
notesEl.value="";
screenshotEl.value="";
}

const entryEl=document.getElementById("entry");
const stopEl=document.getElementById("stop");
const exitEl=document.getElementById("exit");
const riskEl=document.getElementById("risk");
const notesEl=document.getElementById("notes");
const screenshotEl=document.getElementById("screenshot");
const historyEl=document.getElementById("history");

render();
</script>

</body>
</html>
