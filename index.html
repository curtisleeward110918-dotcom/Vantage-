<script>
(() => {

/* =====================================================
   HARDCODED SUPABASE (config screen removed)
===================================================== */
const SUPABASE_URL = "https://wvptlyyxygoyipwbtzmp.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInJlZiI6Ind2cHRseXl4eWdveWlwd2J0em1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5NTM2NjksImV4cCI6MjA5MTUyOTY2OX0.uuUUrmvR5lEXvuemHkE7ERr0Ef7vULBmkgKeJxJfI18";

const state = {
  supabase: window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  ),
  user: null,
  trades: [],
  filtered: [],
  filters: {
    from:"",
    to:"",
    session:"all",
    direction:"all"
  },
  tab:"dashboard"
};

const $ = id => document.getElementById(id);

/* =====================================================
   ELEMENTS
===================================================== */
const els = {
  authView:$("authView"),
  appView:$("appView"),
  logoutBtn:$("logoutBtn"),
  userPill:$("userPill"),
  authStatus:$("authStatus"),
  signInForm:$("signInForm"),
  signUpForm:$("signUpForm")
};

/* =====================================================
   STATUS UI
===================================================== */
function setStatus(msg,type=""){
  if(!els.authStatus) return;
  els.authStatus.className="status "+type;
  els.authStatus.textContent=msg;
}

/* =====================================================
   SHOW / HIDE APP
===================================================== */
function updateAuthUI(){
  const signed = !!state.user;

  els.authView.classList.toggle("hidden",signed);
  els.appView.classList.toggle("hidden",!signed);
  els.logoutBtn.classList.toggle("hidden",!signed);

  if(els.userPill){
    els.userPill.textContent = signed
      ? state.user.email
      : "Sign in to continue";
  }
}

/* =====================================================
   REFRESH SESSION
===================================================== */
async function refreshSession(){
  const { data, error } =
    await state.supabase.auth.getUser();

  if(error){
    setStatus(error.message,"err");
    return;
  }

  state.user = data.user || null;

  updateAuthUI();

  if(state.user){
    setStatus(
      "Signed in as "+state.user.email,
      "ok"
    );

    if(window.loadTrades) await window.loadTrades();
    if(window.refreshAll) window.refreshAll();

  }else{
    setStatus("Ready to sign in.");
  }
}

/* =====================================================
   SIGN IN
===================================================== */
async function signIn(e){
  e.preventDefault();

  const fd = new FormData(els.signInForm);

  const { error } =
    await state.supabase.auth.signInWithPassword({
      email: fd.get("email"),
      password: fd.get("password")
    });

  if(error){
    setStatus(error.message,"err");
    return;
  }

  els.signInForm.reset();
  await refreshSession();
}

/* =====================================================
   SIGN UP
===================================================== */
async function signUp(e){
  e.preventDefault();

  const fd = new FormData(els.signUpForm);

  const { data, error } =
    await state.supabase.auth.signUp({
      email: fd.get("email"),
      password: fd.get("password")
    });

  if(error){
    setStatus(error.message,"err");
    return;
  }

  els.signUpForm.reset();

  setStatus(
    data.user && !data.session
      ? "Account created. Check email."
      : "Account created and signed in.",
    "ok"
  );

  await refreshSession();
}

/* =====================================================
   LOG OUT
===================================================== */
async function signOut(){

  const { error } =
    await state.supabase.auth.signOut();

  if(error){
    setStatus(error.message,"err");
    return;
  }

  state.user = null;
  state.trades = [];
  state.filtered = [];

  updateAuthUI();

  if(window.seedEmpty) window.seedEmpty();

  setStatus("Signed out.","ok");
}

/* =====================================================
   BIND EVENTS
===================================================== */
function bindAuth(){

  els.signInForm?.addEventListener(
    "submit",
    signIn
  );

  els.signUpForm?.addEventListener(
    "submit",
    signUp
  );

  els.logoutBtn?.addEventListener(
    "click",
    signOut
  );

  state.supabase.auth.onAuthStateChange(
    async ()=>{
      await refreshSession();
    }
  );
}

/* =====================================================
   INIT
===================================================== */
async function init(){

  bindAuth();

  await refreshSession();

}

/* expose state */
window.state = state;

init();

})();
</script>
