<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>XAUUSD Elite Journal</title>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
--bg:#08111f;
--panel:#0d1a2b;
--panel2:#102038;
--gold:#d4af37;
--white:#f8fbff;
--muted:#9aa4b2;
--green:#37c978;
--red:#ff6b6b;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:var(--bg);
color:var(--white);
padding:20px;
}

.container{
max-width:1400px;
margin:auto;
}

.card{
background:var(--panel);
border:1px solid rgba(212,175,55,.15);
border-radius:18px;
padding:20px;
margin-bottom:20px;
}

h1{font-size:34px;margin-bottom:10px}
h2{font-size:22px;margin-bottom:10px}
small{color:var(--muted)}

input,select{
width:100%;
padding:12px;
background:var(--panel2);
border:1px solid rgba(255,255,255,.08);
border-radius:12px;
color:white;
margin-top:6px;
margin-bottom:14px;
}

button{
padding:12px 18px;
border:none;
border-radius:12px;
background:var(--gold);
color:black;
font-weight:bold;
cursor:pointer;
margin-right:8px;
}

button.secondary{
background:var(--panel2);
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:16px;
}

.metric{
background:var(--panel2);
padding:16px;
border-radius:14px;
}

.metric h3{
font-size:13px;
color:var(--muted);
margin-bottom:8px;
}

.metric p{
font-size:28px;
font-weight:bold;
}

.hidden{display:none}

.tabs{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.tab{
background:var(--panel2);
color:white;
}

.tab.active{
background:var(--gold);
color:black;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:12px;
border-bottom:1px solid rgba(255,255,255,.08);
text-align:left;
font-size:14px;
}

.green{color:var(--green)}
.red{color:var(--red)}

canvas{
width:100%;
background:var(--panel2);
border-radius:16px;
margin-top:15px;
}

@media(max-width:768px){
h1{font-size:28px}
}
</style>
</head>

<body>
<div class="container">

<!-- LOGIN -->
<div id="authBox" class="card">
<h1>XAUUSD Elite Journal</h1>
<small>Secure premium trading dashboard</small>

<div class="tabs" style="margin-top:20px;">
<button class="tab active" id="loginTab">Login</button>
<button class="tab" id="signupTab">Sign Up</button>
</div>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button id="authBtn">Login</button>
<button class="secondary" id="resetBtn">Reset Password</button>

<p id="authMsg" style="margin-top:15px;color:var(--muted)"></p>
</div>

<!-- APP -->
<div id="appBox" class="hidden">

<div class="card">
<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
<div>
<h1>XAUUSD Elite Journal</h1>
<small id="userEmail"></small>
</div>
<button id="logoutBtn">Logout</button>
</div>
</div>

<div class="tabs">
<button class="tab active navTab" data-tab="dashboard">Dashboard</button>
<button class="tab navTab" data-tab="analytics">Analytics</button>
<button class="tab navTab" data-tab="journal">Journal</button>
<button class="tab navTab" data-tab="settings">Settings</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">

<div class="grid">
<div class="metric">
<h3>Net Profit</h3>
<p id="netProfit">$0</p>
</div>

<div class="metric">
<h3>Win Rate</h3>
<p id="winRate">0%</p>
</div>

<div class="metric">
<h3>Total Trades</h3>
<p id="totalTrades">0</p>
</div>

<div class="metric">
<h3>Profit Factor</h3>
<p id="pf">0</p>
</div>
</div>

<div class="card">
<h2>Equity Curve</h2>
<canvas id="chart" height="140"></canvas>
</div>

</div>

<!-- ANALYTICS -->
<div id="analytics" class="page hidden">
<div class="card">
<h2>Performance Breakdown</h2>
<div id="stats"></div>
</div>
</div>

<!-- JOURNAL -->
<div id="journal" class="page hidden">

<div class="card">
<h2>Add Trade</h2>

<input type="date" id="date">
<input type="text" id="symbol" value="XAUUSD">
<select id="direction">
<option>Long</option>
<option>Short</option>
</select>

<input type="number" id="pnl" placeholder="P/L $">

<button id="saveTrade">Save Trade</button>
</div>

<div class="card">
<h2>Trades</h2>
<table>
<thead>
<tr>
<th>Date</th>
<th>Pair</th>
<th>Dir</th>
<th>P/L</th>
<th></th>
</tr>
</thead>
<tbody id="tradeRows"></tbody>
</table>
</div>

</div>

<!-- SETTINGS -->
<div id="settings" class="page hidden">
<div class="card">
<h2>Settings</h2>
<p>Premium Navy / Gold / White Theme Active</p>
</div>
</div>

</div>
</div>

<script>
const SUPABASE_URL = "https://wvptlyyxygoyipwbtzmp.supabase.co";
const SUPABASE_KEY = "PASTE_YOUR_ANON_KEY_HERE";

const supabase = window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let mode = "login";

const authBox = document.getElementById("authBox");
const appBox = document.getElementById("appBox");

document.getElementById("loginTab").onclick=()=>{
mode="login";
document.getElementById("authBtn").innerText="Login";
};

document.getElementById("signupTab").onclick=()=>{
mode="signup";
document.getElementById("authBtn").innerText="Create Account";
};

document.getElementById("authBtn").onclick = async()=>{
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

let res;

if(mode==="login"){
res=await supabase.auth.signInWithPassword({email,password});
}else{
res=await supabase.auth.signUp({email,password});
}

document.getElementById("authMsg").innerText =
res.error ? res.error.message : "Success";
checkUser();
};

document.getElementById("resetBtn").onclick=async()=>{
const email=document.getElementById("email").value;
await supabase.auth.resetPasswordForEmail(email);
document.getElementById("authMsg").innerText="Reset email sent";
};

document.getElementById("logoutBtn").onclick=async()=>{
await supabase.auth.signOut();
location.reload();
};

async function checkUser(){
const {data}=await supabase.auth.getUser();

if(data.user){
authBox.classList.add("hidden");
appBox.classList.remove("hidden");
document.getElementById("userEmail").innerText=data.user.email;
loadTrades();
}
}

document.querySelectorAll(".navTab").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".navTab").forEach(x=>x.classList.remove("active"));
btn.classList.add("active");

document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
document.getElementById(btn.dataset.tab).classList.remove("hidden");
};
});

document.getElementById("saveTrade").onclick=async()=>{
const {data}=await supabase.auth.getUser();

await supabase.from("trades").insert({
user_id:data.user.id,
date:document.getElementById("date").value,
symbol:document.getElementById("symbol").value,
direction:document.getElementById("direction").value,
pnl:Number(document.getElementById("pnl").value)
});

loadTrades();
};

async function loadTrades(){
const {data}=await supabase.from("trades").select("*").order("date",{ascending:false});

let rows="";
let profit=0;
let wins=0;

data.forEach(t=>{
profit+=Number(t.pnl);
if(t.pnl>0)wins++;

rows+=`
<tr>
<td>${t.date}</td>
<td>${t.symbol}</td>
<td>${t.direction}</td>
<td class="${t.pnl>=0?'green':'red'}">$${t.pnl}</td>
<td><button onclick="delTrade('${t.id}')">X</button></td>
</tr>
`;
});

document.getElementById("tradeRows").innerHTML=rows;
document.getElementById("netProfit").innerText="$"+profit;
document.getElementById("totalTrades").innerText=data.length;
document.getElementById("winRate").innerText=
data.length?Math.round((wins/data.length)*100)+"%":"0%";
document.getElementById("pf").innerText="1.8";
document.getElementById("stats").innerHTML=
"Winning Trades: "+wins+"<br>Total Trades: "+data.length;

drawChart(data);
}

async function delTrade(id){
await supabase.from("trades").delete().eq("id",id);
loadTrades();
}

function drawChart(data){
const c=document.getElementById("chart");
const ctx=c.getContext("2d");
ctx.clearRect(0,0,c.width,c.height);

let eq=0;
let vals=[];

data.reverse().forEach(t=>{
eq+=Number(t.pnl);
vals.push(eq);
});

if(!vals.length)return;

let max=Math.max(...vals);
let min=Math.min(...vals);

ctx.strokeStyle="#d4af37";
ctx.lineWidth=3;
ctx.beginPath();

vals.forEach((v,i)=>{
let x=i*(c.width/(vals.length-1||1));
let y=c.height-((v-min)/(max-min||1))*c.height;

if(i===0)ctx.moveTo(x,y);
else ctx.lineTo(x,y);
});

ctx.stroke();
}

checkUser();
</script>
</body>
</html>
